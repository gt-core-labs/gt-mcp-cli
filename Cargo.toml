[package]
name = "gt-mcp-cli"
version = "0.1.0"
edition = "2021"
description = "Command-line client for the gt-mcp server (Gas Town orchestrator MCP surface)."

[[bin]]
name = "gt-mcp-cli"
path = "src/main.rs"

[dependencies]
rmcp = { version = "1.7", default-features = false, features = [
    "client",
    "transport-streamable-http-client-reqwest",
] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
clap = { version = "4", features = ["derive", "env"] }
serde_json = "1"
anyhow = "1"
