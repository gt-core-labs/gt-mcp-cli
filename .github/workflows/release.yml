# Build the gt binary and publish it as a GitHub Release.
#
# Two trigger paths keep the published binary current:
#   - push tag `v*`   -> immutable, stable release named after the tag (e.g. v0.1.0)
#   - push to main    -> rolling `latest` prerelease, rebuilt on every code change
#                        (the "mantener actualizado" path — always tracks main)
#   - workflow_dispatch for manual reruns.
#
# Each release carries per-target tarballs so `up to date` means "matches the
# latest pushed code", not "whatever someone built locally".
name: release

on:
  push:
    tags: ['v*']
    branches: [main]
    # Skip rebuilds for doc-only / CI-only changes.
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        id: pkg
        run: |
          # The archive holds the `gt` binary at its ROOT (not in a subdir), so
          # install.sh and `gt update` (self_update) find it without a path hint.
          BIN=gt
          DIST="${BIN}-${{ matrix.target }}"
          mkdir -p dist
          tar -czf "dist/${DIST}.tar.gz" -C "target/${{ matrix.target }}/release" "${BIN}"
          ( cd dist && sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256" )
          echo "asset=dist/${DIST}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout FIRST (before download-artifact): actions/checkout runs `git
      # clean`, which would wipe an already-populated dist/. We need the tree
      # only to read the crate version from Cargo.toml on the main path.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Tagged push -> stable release named after the tag.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true

      # Push to main -> rolling `latest` prerelease, always tracking main.
      - name: Publish rolling latest
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (main)
          prerelease: true
          body: >-
            Rolling build of the latest `main` (`${{ github.sha }}`).
            Auto-replaced on every push to main. For pinned builds use a `v*` tag.
          files: |
            dist/*.tar.gz
            dist/*.sha256

      # Push to main -> ALSO cut a stable `v<Cargo version>` release the first
      # time that version is seen. `gt update` (self_update) resolves
      # /releases/latest, which EXCLUDES prereleases — so without a stable tag
      # tracking the current version it stays pinned to the last v* tag while
      # main races ahead in the rolling prerelease (the 2026-06-10 incident:
      # /releases/latest stuck at v0.1.1 while main shipped 0.6.3). Publishing
      # the stable v<version> here keeps /releases/latest == current main with
      # zero manual tagging. Idempotent: skipped when the release already
      # exists, so a stable tag is immutable and only a Cargo.toml version bump
      # cuts a new one. The tag is created by GITHUB_TOKEN, so it does NOT
      # re-trigger this workflow's `tags: ['v*']` path (no double publish).
      - name: Resolve crate version
        id: ver
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="v$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          if gh release view "${version}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "stable release ${version} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "stable release ${version} not found — will publish"
          fi

      - name: Publish stable version release
        if: github.ref == 'refs/heads/main' && steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
